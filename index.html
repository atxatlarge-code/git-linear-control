<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>git-linear-control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="status-tag">Operational</div>
        <h1>git-linear-control</h1>
        
        <div id="insight-box">
            </div>

        <div style="text-align: left; margin: 2rem 0; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <h3 style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1rem; opacity: 0.7;">Project Milestones</h3>
            <ul style="list-style: none; padding: 0; font-size: 0.9rem; line-height: 2;">
                <li>✅ SQST-6: Dark Mode Deployment</li>
                <li>✅ SQST-7: AI Transition Hooks</li>
                <li>🚀 SQST-8: Milestone Tracker (Live)</li>
                <li>⏳ SQST-9: Analytics Integration</li>
            </ul>
        </div>

        <button id="theme-toggle">Toggle Dark Mode</button>
    </div>

    <footer>
        <p>Last Build: <span id="timestamp"></span></p>
    </footer>

    <script>
        document.getElementById('timestamp').innerText = new Date().toLocaleString();
        
        const insights = [
            "AI won't replace project managers, but project managers using AI will.",
            "Tech transitions are iterative deployments.",
            "Movement creates clarity when logic stalls."
        ];
        document.getElementById('insight-box').innerText = `"${insights[Math.floor(Math.random() * insights.length)]}"`;

        const btn = document.getElementById('theme-toggle');
        btn.onclick = () => {
            const root = document.documentElement;
            const isDark = root.getAttribute('data-theme') === 'dark';
            root.setAttribute('data-theme', isDark ? 'light' : 'dark');
        };
    </script>
</body>
</html>
