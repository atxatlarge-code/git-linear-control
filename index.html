<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>git-linear-control</title>
</head>
<body>
    <div class="container">
        <h1>git-linear-control</h1>
        <div class="status-tag">Operational</div>
        <p>Terminal-first CI/CD active.</p>
    </div>

    <footer>
        <p>Last Build: <span id="timestamp"></span></p>
    </footer>

    <script>
        document.getElementById('timestamp').innerText = new Date().toLocaleString();
    </script>
</body>
</html>
