<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>git-linear-control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>git-linear-control</h1>
        <div class="status-tag">Operational</div>
        <button id="theme-toggle" style="margin-top: 20px; padding: 10px; cursor: pointer;">Toggle Dark Mode</button>
    </div>
    <footer>
        <p>Last Build: <span id="timestamp"></span></p>
    </footer>
    <script>
        // Restore the Timestamp function
        document.getElementById('timestamp').innerText = new Date().toLocaleString();
        
        // Restore the Toggle function
        const btn = document.getElementById('theme-toggle');
        btn.onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        };
    </script>
</body>
</html>
